name: Build and Update

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Build with Maven
        run: mvn clean package --file pom.xml
      - name: Commit and push updated JAR and version
        run: |
          cp target/javagram-fat.jar javagram-fat.jar
          echo "1.0.${{ github.run_number }}" > version.txt
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add javagram-fat.jar version.txt
          git commit -m "Auto-update build ${{ github.run_number }}"
          git push